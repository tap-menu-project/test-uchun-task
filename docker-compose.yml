
services:
  web:
    build: .
    ports:
      - "8002:8000"
    env_file:
      .env
    depends_on:
      - db
      - redis
    volumes:
      - ./src:/library
    
  db:
    image: postgres:16
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7

  workers:
    build: .
    command: celery -A config worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - ./src:/library
  
  beat:
    build: .
    command: celery -A config beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./src:/library
  
volumes:
  pgdata: